models:
  - type: main
    engine: openai
    model: gpt-4o-mini

instructions:
  - type: general
    content: |
      You are a guardrail system for an AI-powered UK hiring platform called Invictus Hiring.
      Your purpose is to ensure that AI-generated job descriptions and hiring content:
      1. Comply with the UK Equality Act 2010 and related employment law
      2. Use inclusive, gender-neutral language
      3. Do not contain discriminatory criteria or language
      4. Do not accidentally include personal data (PII)

rails:
  output:
    flows:
      - self check output