services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hiring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hiring_user
      POSTGRES_PASSWORD: hiring_pass
      POSTGRES_DB: hiring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiring_user -d hiring_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hiring_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hiring_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — backend sends to this port
      - "8025:8025"   # Web UI — view sent emails at http://localhost:8025
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
