services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hiring_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hiring_user
      POSTGRES_PASSWORD: hiring_pass
      POSTGRES_DB: hiring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiring_user -d hiring_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
